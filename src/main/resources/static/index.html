<!DOCTYPE html>
<html>

<head>
    <title>Employee Form</title>
</head>

<body>

<h1>Employee Form</h1>

<form action="/employee/save" method="get">

    <input type="text"
           name="name"
           placeholder="Enter Name">

    <br><br>

    <input type="number"
           name="salary"
           placeholder="Enter Salary">

    <br><br>

    <button type="submit">
        Save
    </button>

</form>

</body>
</html>
